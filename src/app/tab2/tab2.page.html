<ion-header [translucent]="true" class="header">
  <ion-back-button>Go back</ion-back-button>
  <ion-toolbar>
    <ion-title>
     Create a New Post
    </ion-title>
  </ion-toolbar>
</ion-header>


<ion-content [fullscreen]="true">
  <form [formGroup]="createPostForm" (ngSubmit)="createPostFirestore()">
    <ion-item>
      <ion-label position="floating">Title</ion-label>
      <ion-input formControlName="postTitle" name="title" required></ion-input>
    </ion-item>
    <ion-item>
      <ion-label position="floating">Content</ion-label>
      <ion-textarea formControlName="postContent" name="content" required></ion-textarea>
    </ion-item>
    <ion-item>
      <ion-label position="floating">Category</ion-label>
      <ion-input formControlName="postCategory"  name="category" required></ion-input>
    </ion-item>
    <ion-item>
      <ion-label position="floating">Image URL</ion-label>
      <ion-input formControlName="postImg" name="img"></ion-input>
    </ion-item>
    <ion-item>
      <ion-label position="floating">Snippet</ion-label>
      <ion-input formControlName="postSnippet" name="snippet" required></ion-input>
    </ion-item>
    <ion-button expand="full" type="submit" [disabled]="!createPostForm.valid">Create Post</ion-button>
  </form>
</ion-content>
